# 豆包 AI 配置
# 
# 字节跳动豆包 AI 助手
# 记忆文件位置（可能路径）

name: 豆包
description: 字节跳动豆包 AI 助手

# 抓取路径（待确认）
paths:
  # macOS
  - ~/Library/Application Support/doubao/
  - ~/.doubao/
  
  # Linux
  - ~/.local/share/doubao/
  
  # Windows
  - ~/AppData/Roaming/doubao/
  - ~/AppData/Local/doubao/

# 文件类型
file_types:
  - .json
  - .md
  - .txt

# 优先级
priority: 2

# 是否启用
enabled: true

# 备注
note: "路径待验证，可能需要根据实际安装位置调整"
