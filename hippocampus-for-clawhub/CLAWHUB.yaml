# ClawHub Listing Configuration
# Hippocampus ClawHub Version Metadata

name: hippocampus
display_name: Hippocampus
tagline: AI Memory Enhancement — Fix human memory flaws, never forget

version: 4.0.0

description: |
  Hippocampus is an AI-enhanced memory system. Core philosophy: "AI should fix
  human memory flaws, not emulate the decay characteristics of human memory."

  Features:
  - Dual-layer architecture: Chronicle (temporal) + Monograph (topic)
  - Never forget: AI precise timestamps, permanent storage
  - Proactive triggering: context-aware loading of relevant memories on high-frequency keywords
  - Micro-Macro workflow: short commands map to complete operation flows
  - Schema: AI task progress table with enforced check-off rules

author: GabetopZ
homepage: https://github.com/Gabe-luv-Nancy/hippocampus
license: MIT

keywords:
  - memory
  - ai-memory
  - photon
  - checkpoint
  - openclaw-skill
  - productivity
  - schema
  - task-management

categories:
  - productivity
  - developer-tools
  - ai-tools

requirements:
  - python3 >= 3.8
  - OpenClaw installed

installation:
  type: prompt
  prompt_file: PROMPT.md
  target_path: ~/.openclaw/workspace/skills/hippocampus/

compatibility:
  openclaw: ">= 1.0.0"
  os:
    - linux
    - darwin
    - windows
    - wsl

commands:
  - /hippo init
  - /hippo status
  - /hippo save
  - /hippo recall
  - /hippo checkpoint
  - /hippo scan

triggers:
  - remember
  - recall
  - checkpoint
  - memory
  - schema

changelog: |
  ## v4.0.0 (2026-04-22)
  - New Schema AI task progress table with enforced check-off rules
  - Dual-end logging: client log + USB log fully traceable
  - AI tool auto-discovery supports 12+ tools

  ## v3.0.0 (2026-03-21)
  - Photon rebrand, commands unified from /hip to /hippo
  - Dual-layer architecture: Chronicle + Monograph
  - Micro-Macro workflow
  - Context-aware proactive triggering

readme: SKILL.md
